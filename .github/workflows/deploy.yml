name: Build and Deploy

# Dockerized GHCR model (per the server runbook): build the image in CI, push to
# GHCR, then SSH in and `compose pull` + one-off migrate + `compose up -d`.
# The server only pulls and runs — it never builds.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-cron-server
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # GHCR namespaces must be lowercase; the owner login may be mixed-case.
      - name: Resolve lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/cron-server" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.APP_DIR }}"
            docker compose pull
            # Migrations as a one-off process (12-factor admin task), not in the web container.
            docker compose run --rm app npx prisma migrate deploy
            docker compose up -d
            docker image prune -f
